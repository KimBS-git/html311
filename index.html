<script>
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('resDate').min = today;
  
  function setPetType(type) {
    document.getElementById('selectedPet').innerText = type;
  }

  function completeRes() {
    const date = document.getElementById('resDate').value;
    const time = document.getElementById('resTime').value;
    const pet = document.getElementById('selectedPet').innerText;

    if(!date) {
      alert('날짜를 선택해주세요!');
      return;
    }

    alert(`${pet} 진료 예약이 ${date} ${time}에 완료되었습니다!`);
    // 여기에 실제 데이터 저장 로직을 추가할 수 있습니다.
    const modal = bootstrap.Modal.getInstance(document.getElementById('reservationModal'));
    modal.hide();
  }
  function showDonationAlert(){
    alert("신한은행 110-137-486743\n예금주 : 김범수")
  }
</script>
