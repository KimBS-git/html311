    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('resDate').min = today;
  // 날짜 최솟값 설정해서 오늘 이전 선택불가, 날짜 문자열로 변환해서 날짜만 가져옴
  function setPetType(type) {
    document.getElementById('selectedPet').innerText = type;
  }
// 선택한 동물 이름 모달에 가져오기
  function completeRes() {
    const date = document.getElementById('resDate').value;
    const time = document.getElementById('resTime').value;
    const phone = document.getElementById('resPhone').value;
    const pet = document.getElementById('selectedPet').innerText;
// 예약확정되면 입력했던 값들 가져오기
    if(!date) {
      alert('날짜를 선택해주세요');
      return;
    }// 날짜 미선택 시 알림창

    const phoneNum = /^(010)-([0-9]{4})-([0-9]{4})$/; // 010으로 시작, 0~9사이 4자리, '-'입력 확인
    if(!phoneNum.test(phone)){
      alert("올바른 연락처를 입력해주세요 (예: 010-0000-0000)");
      return;
    }// 연락처 유효성 검사 후 맞지않을 경우 알림창 

    alert(`${pet} 진료 예약이 ${date} ${time}에 완료되었습니다!\n연락처 : ${phone}`);
    // 예약확정 알림창
    const modal = bootstrap.Modal.getInstance(document.getElementById('reservationModal'));
    modal.hide();
  }// 모달 닫기

  function showDonationAlert(){
    alert("신한은행 110-137-486743\n예금주 : 김범수")
  } // 후원안내 클릭 시 함수 실행하여 계좌 알림창 표시
</script>
